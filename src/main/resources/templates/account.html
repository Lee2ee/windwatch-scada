<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${pageTitle}">내 계정</title>
</head>
<body>
<section>
    <div class="ww-page-header">
        <div>
            <h2 class="ww-page-title">
                <i class="bi bi-person-circle me-2 text-primary"></i>내 계정
            </h2>
            <p class="ww-page-subtitle">프로필 정보 및 비밀번호 변경</p>
        </div>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- 프로필 정보 -->
        <div class="col-lg-4">
            <div class="ww-card h-100">
                <div class="ww-card-header">
                    <i class="bi bi-person-badge me-2 text-primary"></i>계정 정보
                </div>
                <div class="card-body text-center py-4">
                    <div class="rounded-circle bg-primary-subtle d-inline-flex align-items-center justify-content-center mb-3"
                         style="width:80px; height:80px;">
                        <i class="bi bi-person-fill text-primary" style="font-size:2.5rem;"></i>
                    </div>
                    <h5 class="mb-1" th:text="${user?.username}">username</h5>
                    <div class="mb-3">
                        <sec:authorize access="hasRole('ADMIN')">
                            <span class="badge bg-warning text-dark"><i class="bi bi-shield-fill-check me-1"></i>Administrator</span>
                        </sec:authorize>
                        <sec:authorize access="hasRole('OPERATOR')">
                            <span class="badge bg-info"><i class="bi bi-tools me-1"></i>Operator</span>
                        </sec:authorize>
                        <sec:authorize access="hasRole('VIEWER')">
                            <span class="badge bg-secondary"><i class="bi bi-eye me-1"></i>Viewer</span>
                        </sec:authorize>
                    </div>
                    <table class="table table-sm text-start">
                        <tr>
                            <td class="text-muted" style="width:40%">아이디</td>
                            <td class="fw-semibold" th:text="${user?.username}">--</td>
                        </tr>
                        <tr>
                            <td class="text-muted">이메일</td>
                            <td th:text="${user?.email != null and !#strings.isEmpty(user.email)} ? ${user.email} : '미등록'">--</td>
                        </tr>
                        <tr>
                            <td class="text-muted">권한</td>
                            <td th:text="${user?.role}">--</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <!-- 비밀번호 변경 -->
            <div class="ww-card mb-4">
                <div class="ww-card-header">
                    <i class="bi bi-lock me-2 text-warning"></i>비밀번호 변경
                </div>
                <div class="card-body">
                    <form th:action="@{/account/change-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label text-muted small">현재 비밀번호</label>
                            <input type="password" name="currentPassword" class="form-control ww-input"
                                   placeholder="현재 비밀번호 입력" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">새 비밀번호</label>
                            <input type="password" name="newPassword" id="newPassword" class="form-control ww-input"
                                   placeholder="새 비밀번호 (4자 이상)" minlength="4" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">새 비밀번호 확인</label>
                            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control ww-input"
                                   placeholder="새 비밀번호 재입력" required>
                            <div id="pwMatchMsg" class="form-text"></div>
                        </div>
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="bi bi-lock-fill me-1"></i>비밀번호 변경
                        </button>
                    </form>
                </div>
            </div>

            <!-- 이메일 변경 -->
            <div class="ww-card">
                <div class="ww-card-header">
                    <i class="bi bi-envelope me-2 text-info"></i>이메일 변경
                </div>
                <div class="card-body">
                    <form th:action="@{/account/change-email}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label text-muted small">이메일 주소</label>
                            <input type="email" name="email" class="form-control ww-input"
                                   th:value="${user?.email}" placeholder="example@email.com">
                        </div>
                        <button type="submit" class="btn btn-info text-white px-4">
                            <i class="bi bi-envelope-fill me-1"></i>이메일 저장
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</section>

<script>
    const newPw = document.getElementById('newPassword');
    const confirmPw = document.getElementById('confirmPassword');
    const msg = document.getElementById('pwMatchMsg');
    function checkMatch() {
        if (!confirmPw.value) { msg.textContent = ''; return; }
        if (newPw.value === confirmPw.value) {
            msg.textContent = '비밀번호가 일치합니다.';
            msg.className = 'form-text text-success';
        } else {
            msg.textContent = '비밀번호가 일치하지 않습니다.';
            msg.className = 'form-text text-danger';
        }
    }
    newPw.addEventListener('input', checkMatch);
    confirmPw.addEventListener('input', checkMatch);
</script>
</body>
</html>
