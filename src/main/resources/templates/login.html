<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindWatch AI-SCADA | 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/windwatch.css}">
    <style>
        body {
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .login-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(31,111,235,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(35,134,54,0.08) 0%, transparent 50%);
            z-index: 0;
        }
        .login-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(31,111,235,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(31,111,235,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(31,111,235,0.1);
        }
        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1f6feb, #238636);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(31,111,235,0.4);
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e6edf3;
            margin: 0;
        }
        .login-subtitle {
            color: #7d8590;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .form-label {
            color: #8b949e;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }
        .ww-input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            transition: all 0.2s;
        }
        .ww-input:focus {
            background: #0d1117;
            border-color: #1f6feb;
            color: #e6edf3;
            box-shadow: 0 0 0 3px rgba(31,111,235,0.15);
            outline: none;
        }
        .ww-input::placeholder { color: #484f58; }
        .input-group-text {
            background: #161b22;
            border: 1px solid #30363d;
            color: #7d8590;
        }
        .btn-login {
            background: linear-gradient(135deg, #1f6feb, #1a5fcb);
            border: none;
            color: white;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #2679f0, #1f6feb);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(31,111,235,0.4);
            color: white;
        }
        .alert-danger {
            background: rgba(218,54,51,0.1);
            border: 1px solid rgba(218,54,51,0.3);
            color: #f85149;
            border-radius: 8px;
        }
        .alert-success {
            background: rgba(35,134,54,0.1);
            border: 1px solid rgba(35,134,54,0.3);
            color: #3fb950;
            border-radius: 8px;
        }
        .demo-info {
            background: rgba(31,111,235,0.08);
            border: 1px solid rgba(31,111,235,0.2);
            border-radius: 8px;
            padding: 0.85rem;
            margin-top: 1.25rem;
        }
        .demo-info p { margin: 0; color: #8b949e; font-size: 0.8rem; }
        .demo-badge {
            display: inline-block;
            background: rgba(31,111,235,0.2);
            color: #58a6ff;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .form-check-input:checked {
            background-color: #1f6feb;
            border-color: #1f6feb;
        }
        .form-check-label { color: #7d8590; font-size: 0.85rem; }
        .turbine-anim {
            display: inline-block;
            animation: spin 4s linear infinite;
            color: #1f6feb;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #484f58;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>
    <div class="login-grid"></div>

    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo">
                <i class="bi bi-wind turbine-anim"></i>
            </div>
            <h1 class="login-title">WindWatch</h1>
            <p class="login-subtitle">AI-SCADA 풍력 발전 모니터링 시스템</p>
        </div>

        <!-- Error Alert -->
        <div class="alert alert-danger d-flex align-items-center gap-2" th:if="${param.error}">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <!-- Logout Alert -->
        <div class="alert alert-success d-flex align-items-center gap-2" th:if="${param.logout}">
            <i class="bi bi-check-circle-fill"></i>
            <span>성공적으로 로그아웃되었습니다.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person me-1"></i>사용자 ID
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control ww-input" id="username" name="username"
                           placeholder="아이디를 입력하세요" autofocus required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-1"></i>비밀번호
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control ww-input" id="password" name="password"
                           placeholder="비밀번호를 입력하세요" required>
                    <button class="btn input-group-text" type="button" onclick="togglePassword()" title="비밀번호 보기">
                        <i class="bi bi-eye" id="pwdIcon"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">로그인 상태 유지</label>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>로그인
            </button>
        </form>

        <div class="demo-info">
            <p class="mb-2"><i class="bi bi-info-circle me-1 text-primary"></i><strong style="color:#58a6ff">데모 계정 정보</strong></p>
            <p><span class="demo-badge">admin</span> / <span class="demo-badge">operator</span> / <span class="demo-badge">viewer</span></p>
            <p class="mt-1">비밀번호: <span class="demo-badge">password</span></p>
        </div>

        <p class="footer-text">
            <i class="bi bi-shield-lock me-1"></i>
            WindWatch AI-SCADA &copy; 2025 | Secured Connection
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('pwdIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
