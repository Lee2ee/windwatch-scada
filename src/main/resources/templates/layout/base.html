<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | WindWatch AI-SCADA'">WindWatch AI-SCADA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/windwatch.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="ww-body">

<!-- Sidebar -->
<nav class="ww-sidebar" id="sidebar">
    <div class="ww-sidebar-brand">
        <i class="bi bi-wind me-2 text-primary"></i>
        <span class="ww-brand-text">WindWatch</span>
        <small class="d-block text-muted" style="font-size:0.65rem; margin-left:1.8rem;">AI-SCADA v1.0</small>
    </div>

    <ul class="ww-nav-list">
        <li>
            <a th:href="@{/dashboard}" class="ww-nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <i class="bi bi-speedometer2"></i>
                <span>실시간 대시보드</span>
            </a>
        </li>
        <li>
            <a th:href="@{/inspection}" class="ww-nav-item" th:classappend="${activePage == 'inspection'} ? 'active' : ''">
                <i class="bi bi-eye"></i>
                <span>AI 블레이드 검사</span>
            </a>
        </li>
        <li>
            <a th:href="@{/events}" class="ww-nav-item" th:classappend="${activePage == 'events'} ? 'active' : ''">
                <i class="bi bi-bell"></i>
                <span>알람 & 이력</span>
            </a>
        </li>
        <li>
            <a th:href="@{/assistant}" class="ww-nav-item" th:classappend="${activePage == 'assistant'} ? 'active' : ''">
                <i class="bi bi-robot"></i>
                <span>AI 어시스턴트</span>
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/users}" class="ww-nav-item" th:classappend="${activePage == 'admin-users'} ? 'active' : ''">
                <i class="bi bi-people"></i>
                <span>사용자 관리</span>
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/turbines}" class="ww-nav-item" th:classappend="${activePage == 'admin-turbines'} ? 'active' : ''">
                <i class="bi bi-wind"></i>
                <span>터빈 관리</span>
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/reports}" class="ww-nav-item" th:classappend="${activePage == 'admin-reports'} ? 'active' : ''">
                <i class="bi bi-file-earmark-bar-graph"></i>
                <span>운영 리포트</span>
            </a>
        </li>
        <li>
            <a href="/h2-console" target="_blank" class="ww-nav-item">
                <i class="bi bi-database"></i>
                <span>DB 콘솔</span>
            </a>
        </li>
    </ul>

    <div class="ww-sidebar-footer">
        <div class="ww-status-indicator">
            <span class="ww-dot ww-dot-success pulse"></span>
            <small class="text-success">시스템 정상</small>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="ww-main" id="mainContent">
    <!-- Top Navbar -->
    <nav class="ww-topbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm ww-btn-ghost" onclick="toggleSidebar()" title="메뉴 토글">
                <i class="bi bi-list fs-5"></i>
            </button>
            <div class="ww-breadcrumb">
                <i class="bi bi-house me-1"></i>
                <span class="text-muted">/</span>
                <span th:text="${pageTitle}" class="ms-1">페이지</span>
            </div>
        </div>

        <div class="d-flex align-items-center gap-3">
            <!-- Real-time clock -->
            <div class="ww-clock" id="topbarClock">--:--:--</div>

            <!-- Alarm badge -->
            <a th:href="@{/events}" class="ww-alarm-btn" title="활성 알람">
                <i class="bi bi-bell-fill"></i>
                <span class="ww-alarm-badge" id="topbarAlarmCount">0</span>
            </a>

            <!-- User menu -->
            <div class="dropdown">
                <button class="btn ww-user-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end ww-dropdown">
                    <li>
                        <span class="dropdown-item-text text-muted small">
                            <sec:authorize access="hasRole('ADMIN')"><i class="bi bi-shield-fill-check text-warning me-1"></i>Administrator</sec:authorize>
                            <sec:authorize access="hasRole('OPERATOR')"><i class="bi bi-tools text-info me-1"></i>Operator</sec:authorize>
                            <sec:authorize access="hasRole('VIEWER')"><i class="bi bi-eye text-secondary me-1"></i>Viewer</sec:authorize>
                        </span>
                    </li>
                    <li><hr class="dropdown-divider border-secondary"></li>
                    <li>
                        <a th:href="@{/account}" class="dropdown-item">
                            <i class="bi bi-person-gear me-2"></i>내 계정
                        </a>
                    </li>
                    <li><hr class="dropdown-divider border-secondary"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="ww-content">
        <th:block th:replace="${content}"/>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('topbarClock').textContent =
            now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Sidebar toggle
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    }
</script>

<!-- Global Toast Container -->
<div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index:9999; margin-top:60px;"></div>

<!-- Global WebSocket for Alarm Notifications (all pages) -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script>
// Global utilities
function getCsrfToken() {
    return document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
}
function getCsrfHeader() {
    return document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content') || 'X-CSRF-TOKEN';
}
function showToast(msg, type, duration) {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const id = 'toast-' + Date.now();
    const colorClass = type === 'success' ? 'bg-success' : type === 'danger' ? 'bg-danger' : type === 'warning' ? 'bg-warning text-dark' : 'bg-info text-dark';
    const icon = type === 'success' ? 'bi-check-circle-fill' : type === 'danger' ? 'bi-exclamation-triangle-fill' : 'bi-info-circle-fill';
    const html = `<div id="${id}" class="toast show align-items-center text-white ${colorClass} border-0 mb-2 shadow-lg" role="alert">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2">
                <i class="bi ${icon}"></i> ${msg}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('${id}').remove()"></button>
        </div>
    </div>`;
    container.insertAdjacentHTML('beforeend', html);
    setTimeout(() => { const el = document.getElementById(id); if (el) el.remove(); }, duration || 4000);
}

// Global alarm WebSocket subscription
(function initGlobalAlarmWs() {
    // Only if SockJS and StompJs are available (loaded on this page)
    if (typeof SockJS === 'undefined' || typeof StompJs === 'undefined') return;
    // Avoid duplicate if dashboard.js already manages connection
    if (window._globalAlarmWsInit) return;
    window._globalAlarmWsInit = true;
    const socket = new SockJS('/ws');
    const client = new StompJs.Client({
        webSocketFactory: () => socket,
        reconnectDelay: 5000,
        onConnect: function() {
            client.subscribe('/topic/alerts', function(msg) {
                try {
                    const alert = JSON.parse(msg.body);
                    showToast(
                        '<strong>[' + alert.turbineId + ']</strong> ' + alert.message +
                        ' (' + (alert.value ? alert.value.toFixed(1) : '--') + '°C)',
                        'danger', 6000
                    );
                    // Update topbar alarm badge
                    const badge = document.getElementById('topbarAlarmCount');
                    if (badge) badge.textContent = parseInt(badge.textContent || '0') + 1;
                } catch(e) {}
            });
        }
    });
    client.activate();
})();
</script>
</body>
</html>
