spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    open-in-view: false

  sql:
    init:
      mode: always

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 200
      connect-timeout: 200

windwatch:
  ai:
    local:
      vision-url: http://localhost:8001/api/vision/detect
      llm-url: http://localhost:8002/api/llm/ask
    cloud:
      vision-url: https://vision.googleapis.com/v1/images:annotate
      openai-url: https://api.openai.com/v1/chat/completions
      openai-api-key: test-key

logging:
  level:
    com.windwatch: INFO
    org.springframework.batch: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: OFF
